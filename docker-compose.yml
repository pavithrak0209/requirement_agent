version: "3.9"

services:
  api:
    build:
      context: ../..                                  # repo root — so Docker can reach core/
      dockerfile: core/requirements_pod/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./local_storage:/app/local_storage
      - ./taskflow.db:/app/taskflow.db
      - ./credentials:/app/core/requirements_pod/credentials:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped
